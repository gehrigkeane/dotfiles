[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
truncation_length=30
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[git_metrics]
disabled = false
added_style = "bold green bg:color_bg1"
deleted_style = "bold red bg:color_bg1"
format = '[([+$added]($added_style) )([-$deleted]($deleted_style) )](fg:color_fg0 bg:color_bg1)'

# [time]
# disabled = false
# time_format = "%T%.3f"
# style = "bg:color_bg1"
# format = '[[ ’É║ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[cmd_duration]
min_time=0
show_milliseconds=true
style = "bg:color_bg1"
format='[[ ¾░ćé $duration ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[’É▓](bold fg:color_green)'
error_symbol = '[’É▓](bold fg:color_red)'
vimcmd_symbol = '[’É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[’É┤](bold fg:color_purple)'
vimcmd_replace_symbol = '[’É┤](bold fg:color_purple)'
vimcmd_visual_symbol = '[’É┤](bold fg:color_yellow)'

