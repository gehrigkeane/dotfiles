$docker_context\
[Ņé░](fg:color_bg3 bg:color_bg1)\
$cmd_duration\
[Ņé┤ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = "’åŚ"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
